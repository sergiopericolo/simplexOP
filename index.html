
<!DOCTYPE html>

<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplexOP</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

<h1>SimplexOP by &lt;sergiopericolo&gt;, number 1 in the world!</h1>

<div class="card">
    <div id="setup-page">
        <p>Elementi riga (max 10): 
        <input type="number" id="num_elements" value="4" min="1" max="10"></p>
        <label><input type="checkbox" id="use_fractions"> Usa frazioni</label>
        <br><br>
        <button onclick="buildAddPage()">Avanti</button>
    </div>

    <div id="calc-page" class="hidden">
        <div id="matrix-grid" class="grid-container"></div>
        <button onclick="compute()">Calcola</button>
        <button onclick="showHome()" style="background:#888">Indietro</button>
    </div>
</div>

</body>
</html>
